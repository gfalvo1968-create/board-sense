<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BoardSense</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #000;
      color: #39ff14;
      font-family: Arial, sans-serif;
      overflow-x: hidden;
    }

    .splash-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      width: 100%;
      background: radial-gradient(circle at center, #001a00 0%, #000 70%);
      position: relative;
      padding: 20px;
    }

    .radar-container {
      position: relative;
      width: 320px;
      height: 420px;
      text-align: center;
    }

    .radar-circle {
      width: 320px;
      height: 320px;
      border: 3px solid #39ff14;
      border-radius: 50%;
      box-shadow: 0 0 12px #39ff14, 0 0 30px rgba(57, 255, 20, 0.35);
      position: relative;
      overflow: hidden;
      background: radial-gradient(circle at center, rgba(57,255,20,0.08) 0%, rgba(0,0,0,0) 60%);
      margin: 0 auto;
    }

    .radar-ring {
      position: absolute;
      border: 1px solid rgba(57, 255, 20, 0.28);
      border-radius: 50%;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    .ring1 { width: 80px; height: 80px; }
    .ring2 { width: 160px; height: 160px; }
    .ring3 { width: 240px; height: 240px; }

    .crosshair-horizontal,
    .crosshair-vertical {
      position: absolute;
      background: rgba(57, 255, 20, 0.25);
    }

    .crosshair-horizontal {
      width: 100%;
      height: 1px;
      top: 50%;
      left: 0;
      transform: translateY(-50%);
    }

    .crosshair-vertical {
      width: 1px;
      height: 100%;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
    }

    .sweep {
      position: absolute;
      width: 50%;
      height: 2px;
      top: 50%;
      left: 50%;
      transform-origin: left center;
      background: linear-gradient(to right, rgba(57,255,20,0), #39ff14);
      box-shadow: 0 0 10px #39ff14, 0 0 20px rgba(57,255,20,0.5);
      animation: spin 2s linear infinite;
      z-index: 2;
    }

    .sweep-glow {
      position: absolute;
      width: 50%;
      height: 50%;
      top: 0;
      left: 50%;
      transform-origin: bottom left;
      background: conic-gradient(
        from 0deg,
        rgba(57,255,20,0.0) 0deg,
        rgba(57,255,20,0.03) 10deg,
        rgba(57,255,20,0.16) 35deg,
        rgba(57,255,20,0.0) 60deg
      );
      animation: spin 2s linear infinite;
      z-index: 1;
      pointer-events: none;
    }

    .center-dot {
      position: absolute;
      width: 12px;
      height: 12px;
      background: #39ff14;
      border-radius: 50%;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 12px #39ff14;
      z-index: 3;
    }

    .program-name {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(1);
      font-size: 30px;
      font-weight: bold;
      color: #39ff14;
      text-shadow: 0 0 8px #39ff14, 0 0 18px rgba(57,255,20,0.65);
      animation: pulseText 2s ease-in-out infinite;
      z-index: 4;
      letter-spacing: 1px;
    }

    .scan-text {
      margin-top: 18px;
      color: #39ff14;
      font-size: 15px;
      letter-spacing: 3px;
      text-shadow: 0 0 10px #39ff14;
    }

    .dashboard-enter {
      margin-top: 24px;
    }

    .dashboard {
      display: none;
      min-height: 100vh;
      background: radial-gradient(circle at top, rgba(0, 80, 0, 0.18), transparent 30%), #000;
      padding: 18px;
    }

    .dashboard-header {
      text-align: center;
      font-size: 28px;
      font-weight: bold;
      margin: 6px 0 18px;
      text-shadow: 0 0 10px #39ff14, 0 0 20px rgba(57,255,20,0.5);
      letter-spacing: 1px;
    }

    .panel {
      border: 2px solid #39ff14;
      border-radius: 16px;
      background: rgba(0, 24, 0, 0.45);
      box-shadow: 0 0 12px rgba(57,255,20,0.28);
      padding: 16px;
      margin-bottom: 18px;
    }

    .panel h3 {
      margin: 0 0 12px;
      text-shadow: 0 0 8px #39ff14;
    }

    .file-row,
    .action-row,
    .label-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    button {
      background: #000;
      color: #39ff14;
      border: 2px solid #39ff14;
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 16px;
      font-weight: bold;
      box-shadow: 0 0 10px rgba(57,255,20,0.28);
    }

    button:active {
      transform: scale(0.98);
    }

    .hidden-input {
      display: none;
    }

    .check-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin: 12px 0 14px;
    }

    .check-card {
      border: 1px solid rgba(57,255,20,0.45);
      border-radius: 12px;
      padding: 10px 12px;
      background: rgba(0, 12, 0, 0.5);
      box-shadow: inset 0 0 8px rgba(57,255,20,0.08);
    }

    label {
      font-size: 18px;
    }

    input[type="checkbox"] {
      transform: scale(1.2);
      margin-right: 10px;
      accent-color: #39ff14;
    }

    .status {
      margin-top: 12px;
      min-height: 24px;
      color: #9bff87;
      text-shadow: 0 0 8px rgba(57,255,20,0.65);
      word-break: break-word;
    }

    .result-box {
      border: 1px solid rgba(57,255,20,0.45);
      border-radius: 12px;
      padding: 12px;
      margin-top: 12px;
      background: rgba(0, 16, 0, 0.45);
      box-shadow: inset 0 0 10px rgba(57,255,20,0.08);
      min-height: 52px;
    }

    .badge {
      display: inline-block;
      padding: 8px 12px;
      border: 2px solid #39ff14;
      border-radius: 999px;
      box-shadow: 0 0 10px rgba(57,255,20,0.35);
      font-weight: bold;
      margin-bottom: 10px;
    }

    .preview-card {
      margin-top: 14px;
      padding: 12px;
      border: 2px solid #39ff14;
      border-radius: 14px;
      box-shadow: 0 0 12px rgba(57,255,20,0.25);
      background: rgba(0, 20, 0, 0.45);
    }

    #preview {
      width: 100%;
      max-width: 320px;
      margin-top: 10px;
      border: 2px solid #39ff14;
      border-radius: 10px;
      display: none;
      box-shadow: 0 0 12px #39ff14;
      transition: all 0.3s ease;
    }

    #preview.scanning {
      box-shadow: 0 0 25px #39ff14, 0 0 40px #39ff14;
    }

    .label-section {
      margin-top: 16px;
    }

    .label-buttons button {
      min-width: 110px;
    }

    @keyframes spin {
      from {
        transform: rotate(0deg);
      }
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes pulseText {
      0% {
        transform: translate(-50%, -50%) scale(1);
      }
      50% {
        transform: translate(-50%, -50%) scale(1.2);
      }
      100% {
        transform: translate(-50%, -50%) scale(1);
      }
    }

    @media (min-width: 768px) {
      .dashboard {
        max-width: 760px;
        margin: 0 auto;
      }
    }
  </style>
</head>
<body>

  <div class="splash-screen" id="splashScreen">
    <div class="radar-container">
      <div class="radar-circle">
        <div class="radar-ring ring1"></div>
        <div class="radar-ring ring2"></div>
        <div class="radar-ring ring3"></div>
        <div class="crosshair-horizontal"></div>
        <div class="crosshair-vertical"></div>
        <div class="sweep-glow"></div>
        <div class="sweep"></div>
        <div class="center-dot"></div>
        <div class="program-name">BoardSense</div>
      </div>

      <div class="scan-text">SCANNING...</div>

      <div class="dashboard-enter">
        <button onclick="enterDashboard()">ENTER DASHBOARD</button>
      </div>
    </div>
  </div>

  <div class="dashboard" id="dashboard">
    <div class="dashboard-header">BoardSense Dashboard</div>

    <div class="panel">
      <h3>Scan Board</h3>

      <input
        type="file"
        accept="image/*"
        capture="environment"
        id="imageInput"
        class="hidden-input"
      >

      <div class="file-row">
        <button onclick="document.getElementById('imageInput').click()">📸 Take Picture</button>
        <button onclick="uploadImage()">Upload Scan</button>
      </div>

      <p class="status" id="uploadStatus"></p>

      <div class="preview-card">
        <img id="preview" alt="Board preview">
      </div>

      <div class="label-section">
        <h3>Label This Board</h3>
        <div class="label-buttons">
          <button onclick="saveLabel('HIGH')">HIGH</button>
          <button onclick="saveLabel('MEDIUM')">MEDIUM</button>
          <button onclick="saveLabel('LOW')">LOW</button>
          <button onclick="saveLabel('JUNK')">JUNK</button>
        </div>
        <p class="status" id="labelStatus"></p>
      </div>
    </div>

    <div class="panel">
      <h3>Manual Grading</h3>

      <div class="check-grid">
        <div class="check-card">
          <label><input type="checkbox" id="gf">Gold Fingers</label>
        </div>
        <div class="check-card">
          <label><input type="checkbox" id="dc">Dense Chips</label>
        </div>
        <div class="check-card">
          <label><input type="checkbox" id="ic">Industrial Connectors</label>
        </div>
        <div class="check-card">
          <label><input type="checkbox" id="pb">Power Board</label>
        </div>
        <div class="check-card">
          <label><input type="checkbox" id="hv">Heavy</label>
        </div>
      </div>

      <div class="action-row">
        <button onclick="sendManualGrade()">Analyze</button>
      </div>

      <div class="result-box">
        <div class="badge" id="gradeBadge">NO SCAN YET</div>
        <p class="status" id="result"></p>
      </div>
    </div>
  </div>

  <script>
    let audioStarted = false;
    let lastUploadedFilename = "";
    const radarSweepMs = 2000;

    function startRadarBeepLoop() {
      if (audioStarted) return;
      audioStarted = true;

      const AudioContextClass = window.AudioContext || window.webkitAudioContext;
      const audioCtx = new AudioContextClass();

      function beep() {
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();

        oscillator.type = "sine";
        oscillator.frequency.setValueAtTime(880, audioCtx.currentTime);

        gainNode.gain.setValueAtTime(0.0001, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.12, audioCtx.currentTime + 0.01);
        gainNode.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.18);

        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);

        oscillator.start();
        oscillator.stop(audioCtx.currentTime + 0.18);
      }

      beep();
      setInterval(beep, radarSweepMs);
    }

    document.body.addEventListener("click", startRadarBeepLoop, { once: true });
    document.body.addEventListener("touchstart", startRadarBeepLoop, { once: true });

    function enterDashboard() {
      document.getElementById("splashScreen").style.display = "none";
      document.getElementById("dashboard").style.display = "block";
    }

    async function uploadImage() {
      const file = document.getElementById("imageInput").files[0];

      if (!file) {
        alert("Take a picture first");
        return;
      }

      const preview = document.getElementById("preview");
      preview.src = URL.createObjectURL(file);
      preview.style.display = "block";
      preview.classList.add("scanning");

      document.getElementById("uploadStatus").innerText = "SCANNING...";
      document.getElementById("labelStatus").innerText = "";
      document.getElementById("result").innerText = "";
      document.getElementById("gradeBadge").innerText = "SCANNING";

      const formData = new FormData();
      formData.append("file", file);

      const res = await fetch("/upload", {
        method: "POST",
        body: formData
      });

      const data = await res.json();

      preview.classList.remove("scanning");

      lastUploadedFilename = data.filename || "";

      document.getElementById("uploadStatus").innerText =
        `Saved: ${data.filename || "uploaded"}`;

      document.getElementById("gradeBadge").innerText =
        data.ai_grade || "PENDING REVIEW";

      document.getElementById("result").innerText =
        `Confidence: ${data.confidence || "N/A"} | Action: ${data.action || "Review manually"}`;
    }

    async function saveLabel(label) {
      if (!lastUploadedFilename) {
        alert("Scan a board first");
        return;
      }

      const res = await fetch("/label", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          filename: lastUploadedFilename,
          label: label
        })
      });

      const data = await res.json();

      document.getElementById("labelStatus").innerText = data.message;
      document.getElementById("gradeBadge").innerText = label;
    }

    async function sendManualGrade() {
      const res = await fetch("/grade", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          gold_fingers: document.getElementById("gf").checked,
          dense_chips: document.getElementById("dc").checked,
          industrial_connectors: document.getElementById("ic").checked,
          power_board: document.getElementById("pb").checked,
          heavy: document.getElementById("hv").checked
        })
      });

      const data = await res.json();

      document.getElementById("gradeBadge").innerText = data.grade;
      document.getElementById("result").innerText =
        `Score: ${data.score} | Action: ${data.action}`;
    }
  </script>
</body>
</html>
